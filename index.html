
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dwaipayan Pal | Growth, Strategy & AI</title>
    <meta name="description" content="Portfolio of Dwaipayan Pal - Growth, Strategy & AI — Building the Next Wave of Digital Products." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              inter: ['"Inter"', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9', // Sky blue
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
                950: '#082f49',
                black: '#0f172a', // Slate 900
              }
            },
            transitionTimingFunction: {
              // The "Butter" Curve: Fast start, long graceful deceleration
              'premium': 'cubic-bezier(0.16, 1, 0.3, 1)',
              'kinetic': 'cubic-bezier(0.22, 1, 0.36, 1)',
            },
            animation: {
              'fade-in': 'fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shimmer': 'shimmer 2.5s infinite linear',
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0", transform: "translate3d(0, 20px, 0) scale(0.98)" },
                "100%": { opacity: "1", transform: "translate3d(0, 0, 0) scale(1)" }
              },
              shimmer: {
                "0%": { transform: "translate3d(-150%, 0, 0)" },
                "100%": { transform: "translate3d(150%, 0, 0)" }
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 20px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: saturate(180%) blur(10px);
        -webkit-backdrop-filter: saturate(180%) blur(10px);
      }
      html {
        scroll-behavior: smooth;
      }
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .gpu-accelerate {
        transform: translate3d(0,0,0);
        backface-visibility: hidden;
        perspective: 1000px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
</head>
  <body class="bg-white text-slate-900 antialiased font-sans selection:bg-brand-100 selection:text-brand-900 overflow-x-hidden">
    <div id="root"></div>
  </body>
</html>
